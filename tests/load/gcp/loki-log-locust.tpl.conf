#cloud-config

write_files:
- path: /etc/systemd/system/node-exporter.service
  content: |
    [Unit]
    Description=Node exporter
    After=network.target

    [Service]
    Type=simple
    Restart=always
    RestartSec=5
    ExecStartPre=wget https://github.com/prometheus/node_exporter/releases/download/v1.3.1/node_exporter-1.3.1.linux-amd64.tar.gz -P /run
    ExecStartPre=tar -xzvf /run/node_exporter-1.3.1.linux-amd64.tar.gz -C /run
    ExecStartPre=mv /run/node_exporter-1.3.1.linux-amd64/node_exporter /usr/bin
    ExecStart=/usr/bin/node_exporter \
                --web.listen-address=":29100" \
                --web.disable-exporter-metrics \
                --collector.disable-defaults \
                --collector.cpu \
                --collector.diskstats \
                --collector.ethtool \
                --collector.filesystem \
                --collector.hwmon \
                --collector.loadavg \
                --collector.meminfo \
                --collector.netdev \
                --collector.pressure
- path: /etc/systemd/system/locust.service
  content: |
    [Unit]
    Description=logi log locust
    After=network.target

    [Service]
    Type=simple
    Restart=always
    ExecStart=python3 -m locust -f /home/ubuntu/loki-log-locustfile.py --host ${LOKI_URL} --users 1 --spawn-rate 10 --headless --num-logging-sources ${LOGGING_SOURCES} --log-lines ${LOG_LINES_PER_SEC}

package_update: true

packages:
- python3-pip
- jq

runcmd:
- |
  set -eux

  # install deps
  python3 -m pip install locust logfmter Faker

  # wait until the cos-lite node is up
  timeout 1800 bash -c "until curl -s --connect-timeout 2.0 --max-time 5 ${LOKI_URL}/ready; do sleep 5; done"

  timeout 600 bash << 'EOF'
  set -eux

  _is_ready() {
    echo "$(curl -s --connect-timeout 2 --max-time 5 ${LOKI_URL}/ready \
            | grep '^ready$' \
            | wc -l)"
  }

  until [[ "$(_is_ready)" -eq 1 ]]; do sleep 5; done
  EOF

  # now that loki is really ready, start locust
  systemctl daemon-reload
  systemctl start locust.service
  systemctl start node-exporter.service
